<body>
<div id="root"></div>
<script>
var SURL="https://wwugsvsznrsupkjqingw.supabase.co";
var SKEY="sb_publishable_vpuARxHJiq-eWNeF5iVonQ_cMRwkgST";
var APASS="cobisa2026";

var db=supabase.createClient(SURL,SKEY);
var saveTimer=null;

var CATS={
  restaurant:{l:"Restaurant",e:"🍽",c:"#B5532C"},
  vinbar:{l:"Vinbar",e:"🍷",c:"#7A3B45"},
  sevardigheid:{l:"Seværdighed",e:"🏛",c:"#3F5E55"},
  hotel:{l:"Hotel",e:"🏨",c:"#5A4A3A"},
  hus:{l:"Hus / lejlighed",e:"🏠",c:"#6B5B3E"},
  cafe:{l:"Café",e:"☕",c:"#8B6914"},
  andet:{l:"Andet",e:"✦",c:"#9C8B6E"}
};

var TRANS={fly:{l:"Flybillet",e:"✈️"},tog:{l:"Togbillet",e:"🚂"}};

var S={
  unlocked:sessionStorage.getItem("rjb3")===APASS,
  trips:[],loaded:false,activeTrip:null,tab:"oversigt",bookMode:false
};

function uid(){return Math.random().toString(36).slice(2,10)}

function fmtD(d){
  if(!d)return"";
  return new Date(d+"T00:00:00").toLocaleDateString("da-DK",{weekday:"short",day:"numeric",month:"short"});
}
function fmtDL(d){
  if(!d)return"";
  return new Date(d+"T00:00:00").toLocaleDateString("da-DK",{day:"numeric",month:"long",year:"numeric"});
}

function e(tag,cls,html){
  var el=document.createElement(tag);
  if(cls)el.className=cls;
  if(html)el.innerHTML=html;
  return el;
}
function d(cls,html){return e("div",cls,html)}
function btn(cls,text,fn){var b=e("button",cls,text);b.onclick=fn;return b;}
function inp(cls,ph,val,fn,type){
  var i=e("input",cls);
  i.placeholder=ph||"";
  i.value=val||"";
  i.type=type||"text";
  i.oninput=function(){fn(i.value);};
  return i;
}
function lbl(text,child){
  var w=d("field");
  var l=e("label","lbl",text);
  w.appendChild(l);
  w.appendChild(child);
  return w;
}
function app(){return document.getElementById("root");}

async function loadTrips(){
  try{
    var res=await db.from("trips_data").select("data").eq("id",1).single();
    if(res.data&&res.data.data)S.trips=res.data.data;
  }catch(err){}
  S.loaded=true;
  render();
}

function saveTrips(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    db.from("trips_data").update({data:S.trips,updated_at:new Date().toISOString()}).eq("id",1);
  },2000);
}

function setupRT(){
  db.channel("rjb3rt").on("postgres_changes",{event:"UPDATE",schema:"public",table:"trips_data"},function(p){
    if(p.new&&p.new.data){S.trips=p.new.data;render();}
  }).subscribe();
}

function mutateTrip(fn){
  var i=S.trips.findIndex(function(t){return t.id===S.activeTrip;});
  if(i<0)return;
  fn(S.trips[i]);
  saveTrips();
}

function render(){
  app().innerHTML="";
  if(!S.unlocked){renderLock();return;}
  if(!S.loaded){app().innerHTML='<div class="lock"><div style="color:#fff;font-family:Georgia,serif;font-size:20px">Henter rejser…</div></div>';return;}
  if(S.bookMode&&S.activeTrip){renderBook();return;}
  if(!S.activeTrip){renderHome();return;}
  renderTrip();
}

// ── LOCK ────────────────────────────────────────────
function renderLock(){
  var pw="";
  var err=d("pwerr");
  var pi=inp("pwinp","Adgangskode","",function(v){pw=v;},"password");
  pi.addEventListener("keydown",function(ev){if(ev.key==="Enter")tryUnlock();});
  var bx=d("lockbox");
  bx.innerHTML='<div style="font-size:36px">🗺</div>';
  bx.appendChild(e("h1","","Rejsedagbog"));
  bx.appendChild(e("p","","Jeres fælles rejsedagbog"));
  bx.appendChild(pi);
  bx.appendChild(btn("pwbtn","Åbn",tryUnlock));
  bx.appendChild(err);
  var lk=d("lock");
  lk.appendChild(bx);
  app().appendChild(lk);
  function tryUnlock(){
    if(pw===APASS){sessionStorage.setItem("rjb3",APASS);S.unlocked=true;loadTrips();setupRT();}
    else err.textContent="Forkert kode – prøv igen";
  }
}

// ── HOME ────────────────────────────────────────────
function renderHome(){
  var wrap=d("");
  var bg=d("startbg");
  bg.innerHTML='<div class="starteyebrow">Rejsedagbog</div><h1 class="starttitle">Jeres rejser</h1><p class="startsub">Billetter · Steder · Budget · Minder</p>';
  wrap.appendChild(bg);

  var body=d("body");
  wrap.appendChild(body);

  // data btns
  var drow=d("row",{style:"margin-bottom:16px"});
  drow.style.marginBottom="16px";
  drow.appendChild(btn("btn btns btnsm","💾 Gem data",doExport));
  drow.querySelector("button").style.flex="1";
  var b2=btn("btn btns btnsm","📂 Indlæs data",doImport);
  b2.style.flex="1";
  drow.appendChild(b2);
  body.appendChild(drow);

  // trip list
  S.trips.forEach(function(t){
    var tc=d("tripcard");
    var stamp=d("stamp",(t.destination||"???").slice(0,3).toUpperCase());
    var info=d("");
    info.innerHTML='<div class="tname">'+(t.name||"Unavngiven rejse")+'</div><div class="tdest">'+(t.destination||"")+'</div>';
    if(t.start||t.end)info.innerHTML+='<div class="tdates">'+fmtD(t.start)+(t.end?" → "+fmtD(t.end):"")+"</div>";
    var del=btn("trash","🗑",function(ev){
      ev.stopPropagation();
      if(confirm("Slet rejsen?")){
        S.trips=S.trips.filter(function(x){return x.id!==t.id;});
        saveTrips();render();
      }
    });
    tc.appendChild(stamp);tc.appendChild(info);tc.appendChild(del);
    tc.onclick=function(){S.activeTrip=t.id;S.tab="oversigt";render();};
    body.appendChild(tc);
  });

  var showNew=S.trips.length===0;
  var newbtn=btn("ghost","＋ Ny rejse",function(){showNew=true;refreshNew();});
  var newform=d("");
  body.appendChild(newbtn);
  body.appendChild(newform);

  function refreshNew(){
    newbtn.style.display=showNew?"none":"flex";
    newform.innerHTML="";
    if(!showNew)return;
    var name="",dest="",start="",end="";
    var ni=inp("inp","Navn på rejsen (f.eks. Vintur til Alsace)","",function(v){name=v;});
    var di=inp("inp","Destination (f.eks. Frankrig)","",function(v){dest=v;});
    var si=inp("inpsm","",start,function(v){start=v;},"date");
    var ei=inp("inpsm","",end,function(v){end=v;},"date");
    var card=d("card");
    card.innerHTML='<div style="font-family:Georgia,serif;font-size:18px;color:#2F2A22;margin-bottom:14px">Ny rejse</div>';
    var fl=lbl("Navn",ni); var dl=lbl("Destination",di);
    var dr=d("row");
    var sl=d(""); sl.innerHTML='<label class="lbl">Fra</label>'; sl.appendChild(si); sl.style.flex="1";
    var el2=d(""); el2.innerHTML='<label class="lbl">Til</label>'; el2.appendChild(ei); el2.style.flex="1";
    dr.appendChild(sl); dr.appendChild(el2);
    var br=d("btnrow");
    br.appendChild(btn("btn btns","Annuller",function(){showNew=false;refreshNew();}));
    var cb=btn("btn btnp","Opret rejse",function(){
      if(!name.trim()||!dest.trim())return;
      var t={id:uid(),name:name,destination:dest,start:start,end:end,budget:"",stops:[],travelers:[],tickets:[],places:[],expenses:[],photos:[]};
      S.trips.push(t);saveTrips();S.activeTrip=t.id;S.tab="oversigt";render();
    });
    cb.style.flex="1";
    br.appendChild(cb);
    card.appendChild(fl);card.appendChild(dl);card.appendChild(dr);
    card.appendChild(e("div","","")); // spacer
    card.appendChild(br);
    newform.appendChild(card);
  }
  refreshNew();
  app().appendChild(wrap);

  function doExport(){
    var json=JSON.stringify(S.trips,null,2);
    showModal("💾 Gem data","Kopier teksten og gem i Notes. Brug 'Indlæs data' næste gang.",function(body){
      var ta=e("textarea","inp");ta.style.height="150px";ta.style.fontFamily="monospace";ta.style.fontSize="11px";ta.readOnly=true;ta.value=json;
      body.appendChild(ta);
      body.appendChild(btn("btn btng btnw","Kopier til udklipsholder",function(){
        navigator.clipboard.writeText(json).then(function(){alert("Kopieret ✓");}).catch(function(){ta.select();document.execCommand("copy");alert("Kopieret ✓");});
      }));
    });
  }
  function doImport(){
    showModal("📂 Indlæs data","Indsæt den tekst du gemte med 'Gem data'.",function(body){
      var ta=e("textarea","inp");ta.style.height="150px";ta.style.fontFamily="monospace";ta.style.fontSize="11px";ta.placeholder="Indsæt tekst her…";
      body.appendChild(ta);
      body.appendChild(btn("btn btng btnw","Indlæs",function(){
        try{var d2=JSON.parse(ta.value);if(Array.isArray(d2)){S.trips=d2;saveTrips();closeModal();render();}}
        catch(err){alert("Ugyldig data");}
      }));
    });
  }
}

function showModal(title,sub,fn){

  var TABS=[{id:"oversigt",l:"Oversigt",e:"✈️"},{id:"steder",l:"Steder",e:"📍"},{id:"budget",l:"Budget",e:"💰"},{id:"billeder",l:"Billeder",e:"📷"}];

    };

  });

}

// ── BUDGET ──────────────────────────────────────────
function renderBudget(trip,content){
  if(!trip.expenses)trip.expenses=[];
  var hero=d("herobox");content.appendChild(hero);
  var explist=d("");content.appendChild(explist);

  function calcTotal(){return trip.expenses.reduce(function(s,e2){return s+(parseFloat(e2.amount)||0);},0);}

  function refreshHero(){
    hero.innerHTML="";
    var total=calcTotal();
    var budget=parseFloat(trip.budget)||0;
    var rem=budget-total;
    var pct=budget>0?Math.min(100,(total/budget)*100):0;
    var bi=inp("inp","Sæt budget (DKK)",trip.budget,function(v){trip.budget=v;mutateTrip(function(){});refreshHero();},"number");
    bi.style.background="rgba(255,255,255,0.12)";bi.style.border="1px solid rgba(255,255,255,0.25)";bi.style.color="#fff";
    var fl=d("field");fl.innerHTML='<label class="lbl" style="color:rgba(255,255,255,.55)">Samlet budget (DKK)</label>';fl.appendChild(bi);
    hero.appendChild(fl);
    var hr=d("herorow");
    hr.innerHTML='<div><div class="herolbl">Brugt</div><div class="heroval">'+total.toLocaleString("da-DK")+' kr</div></div><div style="text-align:right"><div class="herolbl">Tilbage</div><div class="heroval" style="color:'+(rem<0?"#FFB74D":"#fff")+'">'+rem.toLocaleString("da-DK")+' kr</div></div>';
    hero.appendChild(hr);
    if(budget>0){var pg=d("progress");var pf=d("progfill");pf.style.width=pct+"%";if(total>budget)pf.style.background="#FF7043";pg.appendChild(pf);hero.appendChild(pg);}
  }

  function refreshExp(){
    explist.innerHTML="";
    if(!trip.expenses.length)return;
    explist.appendChild(d("sec","Udgifter"));
    var copy=trip.expenses.slice().reverse();
    copy.forEach(function(ex){
      var row=d("exprow");

      info.appendChild(d("expdesc",ex.desc));
      info.appendChild(d("expcat",ex.category+(ex.paidBy?" · "+ex.paidBy:"")));
      var amt=d("expamt",ex.amount.toLocaleString("da-DK")+" kr");
      var del=btn("trash","🗑",function(){trip.expenses=trip.expenses.filter(function(x){return x.id!==ex.id;});mutateTrip(function(){});refreshHero();refreshExp();});
      row.appendChild(info);row.appendChild(amt);row.appendChild(del);
      explist.appendChild(row);
    });
  }

  refreshHero();
  content.appendChild(d("sec","Registrer udgift"));
  var card=d("card");
  var draft={desc:"",amount:"",category:"mad"};
  var di=inp("inp","Hvad var det? (f.eks. Frokost i Beaune)","",function(v){draft.desc=v;});di.style.marginBottom="8px";
  var r=d("row");r.style.marginBottom="10px";
  var ai=inp("inpsm","Beløb (DKK)","",function(v){draft.amount=v;},"number");
  var sel=e("select","inpsm");
  ["mad","transport","ophold","oplevelser","vin","andet"].forEach(function(c){var o=e("option","",c.charAt(0).toUpperCase()+c.slice(1));o.value=c;sel.appendChild(o);});
  sel.onchange=function(){draft.category=sel.value;};
  r.appendChild(ai);r.appendChild(sel);
  var addbtn=btn("btn btnp btnw","Tilføj udgift",function(){
    if(!draft.desc.trim()||!draft.amount)return;
    trip.expenses.push({id:uid(),desc:draft.desc,amount:parseFloat(draft.amount),category:draft.category,paidBy:""});
    mutateTrip(function(){});di.value="";ai.value="";draft={desc:"",amount:"",category:"mad"};
    refreshHero();refreshExp();

  card.appendChild(di);card.appendChild(r);card.appendChild(addbtn);

// ── BOOK ────────────────────────────────────────────

  var trip=S.trips.find(function(t){return t.id===S.activeTrip;});

  var days=[];
  if(trip.start&&trip.end){
    var cur=new Date(trip.start+"T00:00:00");
    var end=new Date(trip.end+"T00:00:00");
    while(cur<=end){days.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  }

  var total=(trip.expenses||[]).reduce(function(s,ex){return s+(parseFloat(ex.amount)||0);},0);
  var byCat={};
  (trip.expenses||[]).forEach(function(ex){byCat[ex.category]=(byCat[ex.category]||0)+ex.amount;});
  var visited=(trip.places||[]).filter(function(p){return p.status==="visited";});
  var undatedPhotos=(trip.photos||[]).filter(function(p){return days.indexOf(p.date)<0;});

  var wrap=d("");

  // Header

  if(trip.travelers&&trip.travelers.length)cov.innerHTML+='<div class="bktravelers">'+trip.travelers.join(" · ")+"</div>";
  page.appendChild(cov);

  function bkH(text){var w=d("bkh2wrap");w.innerHTML='<h2 class="bkh2">'+text+'</h2>';w.appendChild(d("bkline"));return w;}

  // Facts
  var fs=d("bksec");fs.appendChild(bkH("Rejsefakta"));
  var fg=d("facts");
  [["Destination",trip.destination||"—"],["Antal dage",days.length||"—"],["Rejsende",(trip.travelers||[]).join(", ")||"—"],["Besøgte steder",visited.length],["Billeder",(trip.photos||[]).length],["Forbrug",total.toLocaleString("da-DK")+" kr"]].forEach(function(pair){

    fs.appendChild(d("bksubh","Billetter"));

  page.appendChild(fs);

  // Days

    var places=visited.filter(function(p){return p.date===day;});
    var tickets=(trip.tickets||[]).filter(function(tk){return tk.date===day;});
    if(!photos.length&&!places.length&&!tickets.length)return;
    var sec=d("bksec");sec.appendChild(bkH("Dag "+(i+1)+" — "+fmtDL(day)));
    tickets.forEach(function(tk){sec.appendChild(d("tkrow",TRANS[tk.type].e+" "+tk.from+" → "+tk.to+" kl. "+tk.time));});
    if(photos.length){var pg=d("bkphotogrid");photos.forEach(function(p){var fig=document.createElement("figure");fig.style.margin="0";var img=e("img","bkphoto");img.src=p.src;fig.appendChild(img);if(p.caption)fig.innerHTML+='<figcaption class="bkcap">'+p.caption+'</figcaption>';pg.appendChild(fig);});sec.appendChild(pg);}
    places.forEach(function(p){var cat=CATS[p.category]||CATS.andet;var row=d("bkplrow");row.innerHTML='<span style="font-size:20px">'+cat.e+'</span><div><div style="font-family:Georgia,serif;font-size:15px;color:#2F2A22">'+p.name+'</div>'+(p.note?'<div style="font-size:13px;color:#8A7A63">'+p.note+'</div>':"")+"</div>";sec.appendChild(row);});
    page.appendChild(sec);
  });

  // Undated places
  if(undatedPlaces.length){
    var up=d("bksec");up.appendChild(bkH("Steder & oplevelser"));
    Object.entries(CATS).forEach(function(entry){
      var key=entry[0],cat=entry[1];
      var items=undatedPlaces.filter(function(p){return p.category===key;});
      if(!items.length)return;
      up.appendChild(d("bksubh",cat.e+" "+cat.l));
      items.forEach(function(p){up.innerHTML+='<div style="margin-bottom:10px"><div style="font-family:Georgia,serif;font-size:15px">'+p.name+'</div>'+(p.note?'<div style="font-size:13px;color:#8A7A63">'+p.note+'</div>':"")+"</div>";});
    });
    page.appendChild(up);
  }

  // Undated photos
  if(undatedPhotos.length){
    var upp=d("bksec");upp.appendChild(bkH("Billeder"));
    var pg2=d("bkphotogrid");
    undatedPhotos.forEach(function(p){var fig=document.createElement("figure");fig.style.margin="0";var img=e("img","bkphoto");img.src=p.src;fig.appendChild(img);if(p.caption)fig.innerHTML+='<figcaption class="bkcap">'+p.caption+'</figcaption>';pg2.appendChild(fig);});
    upp.appendChild(pg2);page.appendChild(upp);
  }

  // Budget
  var bs=d("bksec");bs.appendChild(bkH("Budget"));
  bs.innerHTML+='<div class="facts"><div><div class="factl">Budget</div><div class="factv">'+(trip.budget?parseFloat(trip.budget).toLocaleString("da-DK")+" kr":"—")+'</div></div><div><div class="factl">Forbrug</div><div class="factv">'+total.toLocaleString("da-DK")+" kr</div></div></div>";
  Object.entries(byCat).forEach(function(entry){bs.innerHTML+='<div class="bkbudrow"><span>'+entry[0]+'</span><span style="font-family:monospace">'+entry[1].toLocaleString("da-DK")+" kr</span></div>";});
  page.appendChild(bs);
  page.appendChild(d("bkfooter","— Lavet med jeres rejsedagbog —"));

  wrap.appendChild(page);
  app().appendChild(wrap);
}

// ── INIT ────────────────────────────────────────────
if(S.unlocked){loadTrips();setupRT();}
render();
</script>
